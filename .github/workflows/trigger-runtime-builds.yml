name: Trigger Runtime Builds

on:
  # Trigger on the completion of the Snapshots workflow
  workflow_run:
    workflows: [Snapshots]
    types: [completed]
    branches:
      - "development"
  # Allow manual triggering
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        repo:
          - "ortus-boxlang/boxlang-miniserver"
          - "ortus-boxlang/boxlang-servlet"
          - "ortus-boxlang/boxlang-aws-lambda"

    steps:
      - name: Trigger Build Workflow for ${{ matrix.repo }}
        run: |
          curl -L \
            --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHA_WORKFLOW_DISPATCHER_PAT_BOXLANG }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ matrix.repo }}/actions/workflows/snapshot.yml/dispatches \
            -d '{"ref": "development"}'

      - name: Inform Slack
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: boxlang
          SLACK_COLOR: ${{ job.status }} # or a specific color like 'green' or '#ff00ff'
          SLACK_ICON_EMOJI: ":bell:"
          SLACK_MESSAGE: "${{ github.repository }} trigger for runtime builds failed for ${{ matrix.repo }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SLACK_TITLE: "${{ github.repository }} Build Failure - ${{ matrix.repo }}"
          SLACK_USERNAME: CI
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          MSG_MINIMAL: true
